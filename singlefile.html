        :root {

            --border: #2a2a2a;
            --text: #e4e4e7;
            --text-muted: #a1a1aa;
            --accent: #ffffff;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .hidden {
            display: none !important;
        }

        #poc-loader {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease-out;
        }

            font-size: 3rem;
            margin-bottom: 20px;
            color: #fff;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #page-content {
            flex: 1;
            padding-top: 80px;
        }

<body>
    <div id="poc-loader">
        <div class="loading-logo"><i class="fa-solid fa-ghost"></i> Phantom</div>
        <div class="spinner"></div>
    </div>

    <div id="app-container" class="hidden">
        <main id="page-content"></main>
    </div>

    <!-- PAGE TEMPLATES -->

    <!-- Home Template -->
    <template id="tpl-home">
        <div class="home-page">
            <main class="main-content">
                <h1 class="site-title">Phantom Unblocked</h1>
                <p class="site-subtitle" id="subtitle"></p>
                <div class="search-container">
                    <form class="search-bar" onsubmit="handleSearch(event)">
                        <i class="fa-solid fa-search"></i>
                        <input type="text" id="search-input" placeholder="Search the web and games..."
                            autocomplete="off">
                    </form>
                </div>
                <section class="featured-section">
                    <div class="section-header">
                        <i class="fa-solid fa-star star-icon"></i>
                        <span class="section-title">Featured</span>
                    </div>
                    <div class="featured-grid" id="featured-grid"></div>
                </section>
                <div class="online-counter" style="margin-top: 24px; font-size: 0.875rem; color: var(--text-muted);">
                    <span id="page-online-count">--</span> online
                    <span id="page-refresh-countdown" style="margin-left: 4px; opacity: 0.6;"></span>
                </div>
            </main>
        </div>
    </template>

    <!-- Games Template -->
    <template id="tpl-games">
        <div class="games-page">
            <header class="page-header">
                <h1 class="page-title">Game Library</h1>
                <p class="page-subtitle" id="game-count">Loading library...</p>
            </header>
            <div class="controls">
                <div class="search-box">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search 2000+ games...">
                </div>
                <div class="tab-toggle">
                    <button class="tab-btn active" id="liked-toggle"><i class="fa-solid fa-heart"></i>
                        Favorites</button>
                    <button class="tab-btn" id="random-btn"><i class="fa-solid fa-random"></i> Random</button>
                </div>
                <div class="search-box" style="flex:0; min-width: 150px;">
                    <select id="sort-select"
                        style="width:100%; background:transparent; border:none; color:var(--text); outline:none;">
                        <option value="popularity">Popularity</option>
                        <option value="newest">Newest</option>
                        <option value="trendingWeek">Trending</option>
                    </select>
                </div>
            </div>
            <div id="recent-section" style="display: none; margin-bottom: 2rem;">
                <div class="section-header"
                    style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px; color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; padding-left: 20px;">
                    <i class="fa-solid fa-clock-rotate-left"></i> Recent Games
                </div>
                <div class="games-grid" id="recent-grid" style="padding-top: 0;"></div>
            </div>
            <div class="games-grid" id="games-grid" style="padding: 20px;"></div>
        </div>
    </template>

    <!-- Movies Template -->
    <template id="tpl-movies">
        <div class="movies-page">
            <header class="page-header">
                <h1 class="page-title">Movies & TV</h1>
                <p class="page-subtitle">Stream movies and TV shows</p>
            </header>
            <div class="controls">
                <div class="search-box">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search movies & TV...">
                    <div class="search-suggestions" id="suggestions"></div>
                </div>
                <div class="tab-toggle">
                    <button class="tab-btn active" id="movies-tab">Movies</button>
                    <button class="tab-btn" id="tv-tab">TV Shows</button>
                </div>
                <div class="search-box" style="flex:0; min-width: 150px;">
                    <select id="genre-select"
                        style="width:100%; background:transparent; border:none; color:var(--text); outline:none;">
                        <option value="">All Genres</option>
                    </select>
                </div>
            </div>
            <div id="continue-watching-section" style="display: none; margin-bottom: 2rem;">
                <div class="section-header" style="padding-left: 20px;">
                    <i class="fa-solid fa-clock-rotate-left"></i> Continue Watching
                </div>
                <div class="media-grid" id="continue-watching-grid"></div>
            </div>
            <div class="media-grid" id="media-grid"></div>
            <!-- Season Explorer -->
            <div class="season-explorer" id="season-explorer">
                <div class="season-explorer-header">
                    <span class="season-explorer-title" id="show-title">Select Episode</span>
                    <button class="season-explorer-close" onclick="closeSeasonExplorer()"><i
                            class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="seasons-list" id="seasons-list"></div>
                <div class="episodes-list" id="episodes-list"></div>
            </div>
        </div>
    </template>

    <!-- Music Template -->
    <template id="tpl-music">
        <div class="app music-app">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>Library</h2>
                </div>
                <div class="playlist-section">
                    <div class="playlist-item" id="likedPlaylist">
                        <div class="playlist-icon"><i class="fa-solid fa-heart"></i></div>
                        <div class="playlist-info">
                            <div class="playlist-name">Liked Songs</div>
                            <div class="playlist-count" id="likedCount">0 songs</div>
                        </div>
                    </div>
                    <div class="playlist-songs" id="likedSongs"></div>
                </div>
            </aside>
            <main class="main">
                <div class="track-info" style="padding: 40px; text-align: center;">
                    <div class="track-title" id="trackTitle">No track selected</div>
                    <div class="track-artist" id="trackArtist">Search for music</div>
                    <div class="progress-container">
                        <span id="currentTime">0:00</span>
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <span id="totalTime">0:00</span>
                    </div>
                </div>
            </main>
            <audio id="audio1" crossorigin="anonymous"></audio>
            <audio id="audio2" crossorigin="anonymous"></audio>
        </div>
    </template>

    <!-- Watch Template -->
    <template id="tpl-watch">
        <div class="watch-page">
            <header class="page-header">
                <h1 class="page-title">Watch</h1>
                <p class="page-subtitle">Stream movies and TV shows</p>
                <div id="status"
                    style="font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; opacity: 0.6; height: 1em;">
                </div>
            </header>
            <div class="controls">
                <div class="search-box">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search YouTube...">
                </div>
                <div class="tab-toggle">
                    <button class="tab-btn active" id="youtube-tab">YouTube</button>
                    <button class="tab-btn" id="twitch-tab">Twitch</button>
                </div>
            </div>
            <div id="continue-watching-section" style="display: none; margin-bottom: 2rem;">
                <div class="section-header" style="padding-left: 20px;">
                    <i class="fa-solid fa-clock-rotate-left"></i> Continue Watching
                </div>
                <div class="media-grid" id="continue-watching-grid"></div>
            </div>
            <div class="media-grid" id="media-grid"></div>
        </div>
    </template>

    <!-- Chat Template -->
    <template id="tpl-chat">
        <div class="app-container" id="chatApp">
            <aside class="sidebar" id="chatSidebar">
                <div class="sidebar-header"><span>Phantom AI</span></div>
                <button class="new-chat-btn" id="newChatBtn"><span>New Chat</span></button>
                <div class="conversations" id="conversationsList"></div>
            </aside>
            <main class="main-content">
                <header class="chat-header">
                    <span class="chat-title" id="chatTitle">Phantom AI</span>
                    <select id="modelSelector" class="select input">
                        <option value="loading">Loading...</option>
                    </select>
                </header>
                <div class="chat-body" id="chatBody"></div>
                <div class="chat-footer">
                    <div class="input-container">
                        <textarea id="chatInput" placeholder="Message Phantom AI..." rows="1"></textarea>
                        <button id="sendBtn" class="send-btn" disabled><i class="fas fa-arrow-up"></i></button>
                    </div>
                </div>
            </main>
        </div>
    </template>

    <!-- Settings Template -->
    <template id="tpl-settings">
        <div class="settings-page">
            <div class="settings-container">
                <div class="settings-header">
                    <h1>Settings</h1>
                    <p>Customize your Phantom experience</p>
                </div>
                <div class="settings-nav">
                    <button class="settings-tab active" data-tab="appearance">Appearance</button>
                    <button class="settings-tab" data-tab="cloak">Cloaking</button>
                    <button class="settings-tab" data-tab="proxy">Proxy</button>
                </div>
                <div class="settings-panel active" id="panel-appearance">
                    <!-- Populated by settingpage.js -->
                </div>
            </div>
        </div>
    </template>

</body>

</html>
